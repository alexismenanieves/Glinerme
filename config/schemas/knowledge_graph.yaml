name: knowledge_graph
description: General-purpose entity and relation extraction for markdown documents

entities:
  person: "Names of people, executives, or individuals"
  organization: "Companies, institutions, or business entities"
  location: "Geographic places, cities, countries"

relations:
  works_for: "Employment relationship where a person works at an organization"
  founded: "Founding relationship where a person created an organization"
  located_in: "Geographic relationship where an entity is in a location"
  acquired: "Acquisition relationship between organizations"

inference:
  threshold: 0.5
  include_confidence: true
  include_spans: false
